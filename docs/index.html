<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>
  <title>Workshop aanmelden</title>

  <style>
    body {
      font-family: Arial;
      background: #f3eeeb;
      text-align: center;
    }

    .box {
      background: white;
      padding: 25px;
      margin: 50px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
    }

    input, button {
      width: 90%;
      padding: 12px;
      font-size: 16px;
      margin: 6px;
    }

    button {
      background: #645dd1;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 25px;
    }

    .persoon {
      border-top: 1px solid #ddd;
      margin-top: 10px;
      padding-top: 10px;
    }
    input[type="checkbox"] {
  width: auto;
  margin: 0 8px 0 0;
  padding: 0;
  vertical-align: middle;
}

label.voorwaarden {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  text-align: left;
  font-size: 13px;
  margin: 15px 6px;
  line-height: 1.4;
}
  </style>
</head>

<body>

<img src="logo.jpeg" style="width: 300px; margin-bottom: 20px;">
<p id="statusTop"></p>

<h2 id="titel"></h2>

<p id="intro" style="text-align:left;"></p>

<p id="beschrijving" style="text-align:left;"></p>

<table style="width:100%; text-align:left; border-collapse:collapse; margin-bottom:20px;">
  <tr>
    <td><strong>Datum:</strong></td>
    <td id="datum"></td>
  </tr>
  <tr>
    <td><strong>Tijd:</strong></td>
    <td id="tijd"></td>
  </tr>
  <tr>
    <td><strong>Locatie:</strong></td>
    <td id="locatie"></td>
  </tr>
  <tr>
    <td><strong>Leeftijd:</strong></td>
    <td id="leeftijd"></td>
  </tr>
  <tr>
    <td><strong>Maximaal:</strong></td>
    <td id="maximaal"></td>
  </tr>
  <tr>
    <td><strong>Kosten:</strong></td>
    <td id="kosten"></td>
  </tr>
</table>

  <p id="status"></p>

 <form onsubmit="sendData(event)">
    <div id="personen"></div>

  <label class="voorwaarden">
  <input type="checkbox" required>
  <span>
    Ik ga akkoord met de
    <a href="https://dewerkplaats.art/algemene-voorwaarden-de-werkplaats/" target="_blank">Algemene Voorwaarden</a>
    en het
    <a href="privacybeleid.html" target="_blank">Privacybeleid</a>.
  </span>
</label>

  <button type="submit" id="btn">Aanmelden</button>
  <button type="button" id="addBtn" onclick="addPersoon()">+ Persoon toevoegen</button>
  <button type="button" onclick="removeLast()">Verwijderen</button>
</form>

  <p id="melding"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sheetIndex = 0;

const URL = "https://script.google.com/macros/s/AKfycbwTQuKZuv_YlrO-5RCUs9jR01KSWSrx6Txja6gQrONzfxxLj-8Uw8NBDfY8RDduzZ86HA/exec";

let beschikbarePlekken = 8;

// ➕ toevoegen
function addPersoon() {

  if (document.querySelectorAll(".persoon").length >= beschikbarePlekken) {
    alert("Er zijn niet genoeg plaatsen meer beschikbaar.");
    return;
  }

  const container = document.getElementById("personen");
  if (!container) return;

  const div = document.createElement("div");
  div.className = "persoon";

  div.innerHTML = `
    <input placeholder="Naam" required>
    <input type="number" placeholder="Leeftijd" required>
    <input placeholder="Telefoon">
    <input type="email" placeholder="Email">
  `;

  container.appendChild(div);
}

// ❌ verwijderen
function removeLast() {
  const container = document.getElementById("personen");
  if (container && container.lastElementChild) {
    container.lastElementChild.remove();
  }
}

// 📊 teller ophalen (veilig)
function updateCount() {
  try {
    const script = document.createElement("script");
    script.src = URL + "?index=" + sheetIndex + "&callback=handleCount";
    document.body.appendChild(script);
  } catch (e) {
    console.log(e);
  }
}

function handleCount(data) {
  try {

    beschikbarePlekken = data.left ?? 8;

    // Workshopinformatie uit de spreadsheet
    if (data.info) {

      document.getElementById("titel").innerText = data.info.Titel || "";
      document.getElementById("intro").innerText = data.info.Intro || "";
      document.getElementById("beschrijving").innerText = data.info.Beschrijving || "";

      document.getElementById("datum").innerText = data.info.Datum || "";
      document.getElementById("tijd").innerText = data.info.Tijd || "";
      document.getElementById("locatie").innerText = data.info.Locatie || "";
      document.getElementById("leeftijd").innerText = data.info.Leeftijd || "";
      document.getElementById("maximaal").innerText = data.info.Maximaal || "";
      document.getElementById("kosten").innerText = data.info.Kosten || "";
    }

    const status = document.getElementById("status");
    const btn = document.getElementById("btn");
    const addBtn = document.getElementById("addBtn");

    if (beschikbarePlekken === 0) {
      status.innerText = "❌ Deze workshop is vol";
      btn.disabled = true;
      btn.style.background = "#999";
    } else {
      status.innerText = beschikbarePlekken + " plekken beschikbaar";
      btn.disabled = false;
      btn.style.background = "#645dd1";
    }

    if (beschikbarePlekken <= 1) {
      addBtn.disabled = true;
      addBtn.style.background = "#999";
    } else {
      addBtn.disabled = false;
      addBtn.style.background = "#645dd1";
    }

    document.getElementById("statusTop").innerText = "Aanmelden workshop";

  } catch (e) {
    console.log(e);
  }
}

// 🚀 verzenden
function sendData(e) {
  e.preventDefault();

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "Bezig met aanmelden...";

  if (beschikbarePlekken <= 0) {
  alert("Deze workshop is vol.");
  return;
}
  const inputs = document.querySelectorAll(".persoon input");
  if (inputs.length === 0) {
    alert("Voeg eerst een persoon toe");
    return;
  }

  let personen = [];

  for (let i = 0; i < inputs.length; i += 4) {
    personen.push({
      naam: inputs[i].value,
      leeftijd: inputs[i+1].value,
      telefoon: inputs[i+2].value,
      email: inputs[i+3].value,
      index: sheetIndex
    });
  }

  document.getElementById("melding").innerText = "Bezig...";

  fetch(URL, {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify(personen)
})
.then(() => {
  document.getElementById("melding").innerText = "✅ Aanmelding verzonden!";
  btn.innerText = "Verzonden";
})
.catch(() => {
  document.getElementById("melding").innerText = "❌ Fout";
  btn.disabled = false;
  btn.innerText = "Aanmelden";
});
}

// START
window.onload = function() {
  addPersoon();
  updateCount();              // 👈 HIER
  setInterval(updateCount, 2000); // 👈 en deze (optioneel)
};
</script>

</body>
</html>
