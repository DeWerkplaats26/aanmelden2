<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop aanmelden</title>

<style>
body{
    font-family:Arial;
    background:#f3eeeb;
    text-align:center;
}

.box{
    background:white;
    padding:25px;
    margin:50px auto;
    width:90%;
    max-width:450px;
    border-radius:12px;
}

input,button{
    width:90%;
    padding:12px;
    font-size:16px;
    margin:6px;
}

button{
    background:#645dd1;
    color:white;
    border:none;
    border-radius:25px;
    cursor:pointer;
}

.persoon{
    border-top:1px solid #ddd;
    margin-top:10px;
    padding-top:10px;
}

input[type=checkbox]{
    width:auto;
    margin-right:8px;
}

label.voorwaarden{
    display:flex;
    align-items:flex-start;
    gap:8px;
    text-align:left;
    font-size:13px;
    margin-top:15px;
}
</style>

</head>

<body>

<img src="logo.jpeg" style="width:300px;margin-bottom:20px;">

<div class="box">

<p id="statusTop"></p>

<h2 id="titel"></h2>

<p id="intro" style="text-align:left"></p>

<p id="beschrijving" style="text-align:left"></p>

<table style="width:100%;text-align:left;border-collapse:collapse;margin-bottom:20px;">
<tr><td><b>Datum:</b></td><td id="datum"></td></tr>
<tr><td><b>Tijd:</b></td><td id="tijd"></td></tr>
<tr><td><b>Locatie:</b></td><td id="locatie"></td></tr>
<tr><td><b>Leeftijd:</b></td><td id="leeftijd"></td></tr>
<tr><td><b>Maximaal:</b></td><td id="maximaal"></td></tr>
<tr><td><b>Kosten:</b></td><td id="kosten"></td></tr>
</table>

<p id="status"></p>

<form onsubmit="sendData(event)">

<div id="personen"></div>

<label class="voorwaarden">
<input type="checkbox" required>
<span>
Ik ga akkoord met de
<a href="https://dewerkplaats.art/algemene-voorwaarden-de-werkplaats/" target="_blank">Algemene Voorwaarden</a>
en het
<a href="privacybeleid.html" target="_blank">Privacybeleid</a>.
</span>
</label>

<button type="submit" id="btn">Aanmelden</button>

<button type="button" id="addBtn" onclick="addPersoon()">
+ Persoon toevoegen
</button>

<button type="button" onclick="removeLast()">
Verwijderen
</button>

</form>

<p id="melding"></p>

</div>

<script>

const sheetIndex = 0;

const URL="https://script.google.com/macros/s/AKfycbwTQuKZuv_YlrO-5RCUs9jR01KSWSrx6Txja6gQrONzfxxLj-8Uw8NBDfY8RDduzZ86HA/exec";

let beschikbarePlekken=8;

function addPersoon(){

if(document.querySelectorAll(".persoon").length>=beschikbarePlekken){
alert("Er zijn niet genoeg plaatsen meer beschikbaar.");
return;
}

const div=document.createElement("div");
div.className="persoon";

div.innerHTML=`
<input placeholder="Naam" required>
<input type="number" placeholder="Leeftijd" required>
<input placeholder="Telefoon">
<input type="email" placeholder="Email">
`;

document.getElementById("personen").appendChild(div);

}

function removeLast(){

const container=document.getElementById("personen");

if(container.lastElementChild){
container.lastElementChild.remove();
}

}

function updateCount(){

const oud=document.getElementById("workshopData");

if(oud){
oud.remove();
}

const script=document.createElement("script");

script.id="workshopData";

script.src=
URL+
"?index="+sheetIndex+
"&callback=handleCount"+
"&t="+Date.now();

document.body.appendChild(script);

}

function handleCount(data){

beschikbarePlekken=data.left??8;

if(data.info){

titel.innerText=data.info.Titel||"";
intro.innerText=data.info.Intro||"";
beschrijving.innerText=data.info.Beschrijving||"";

datum.innerText=data.info.Datum||"";
tijd.innerText=data.info.Tijd||"";
locatie.innerText=data.info.Locatie||"";
leeftijd.innerText=data.info.Leeftijd||"";
maximaal.innerText=data.info.Maximaal||"";
kosten.innerText=data.info.Kosten||"";

}
    const status=document.getElementById("status");
    const btn=document.getElementById("btn");
    const addBtn=document.getElementById("addBtn");

    if(beschikbarePlekken<=0){

        status.innerHTML="❌ Deze workshop is vol";

        btn.disabled=true;
        btn.style.background="#999";

        addBtn.disabled=true;
        addBtn.style.background="#999";

    }else{

        status.innerHTML=beschikbarePlekken+" plaatsen beschikbaar";

        btn.disabled=false;
        btn.style.background="#645dd1";

        if(beschikbarePlekken<=1){

            addBtn.disabled=true;
            addBtn.style.background="#999";

        }else{

            addBtn.disabled=false;
            addBtn.style.background="#645dd1";

        }

    }

    statusTop.innerText="Aanmelden workshop";

}

// ----------------------
// FORMULIER VERZENDEN
// ----------------------

function sendData(e){

e.preventDefault();

const btn=document.getElementById("btn");

btn.disabled=true;
btn.innerText="Bezig met aanmelden...";

if(beschikbarePlekken<=0){

alert("Deze workshop is vol.");

btn.disabled=false;
btn.innerText="Aanmelden";

return;

}

const inputs=document.querySelectorAll(".persoon input");

if(inputs.length===0){

alert("Voeg eerst een persoon toe");

btn.disabled=false;
btn.innerText="Aanmelden";

return;

}

let personen=[];

for(let i=0;i<inputs.length;i+=4){

personen.push({

naam:inputs[i].value,
leeftijd:inputs[i+1].value,
telefoon:inputs[i+2].value,
email:inputs[i+3].value,
index:sheetIndex

});

}

melding.innerHTML="Bezig...";

fetch(URL,{

method:"POST",
mode:"no-cors",
body:JSON.stringify(personen)

})
.then(()=>{

melding.innerHTML="✅ Aanmelding verzonden!";

btn.innerText="Verzonden";

updateCount();

})
.catch(()=>{

melding.innerHTML="❌ Er is iets misgegaan.";

btn.disabled=false;
btn.innerText="Aanmelden";

});

}

// ----------------------
// PAGINA START
// ----------------------

window.onload=function(){

addPersoon();

updateCount();

// Elke 2 seconden opnieuw ophalen
setInterval(updateCount,2000);

};

</script>

</body>
</html>
